<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事図解ジェネレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ads: {
                            bg: '#FFFFFF',
                            surface: '#F8FAFC',
                            hover: '#F1F5F9',
                            border: '#E2E8F0',
                            accent: '#3B82F6',
                            'accent-light': '#2563EB',
                            text: '#1E293B',
                            muted: '#64748B',
                            dim: '#94A3B8',
                            positive: '#10B981',
                            negative: '#EF4444',
                            warning: '#F59E0B',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', '"Hiragino Sans"', '"Hiragino Kaku Gothic ProN"', '"Yu Gothic UI"', '"Meiryo"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-blue-600 to-purple-700 min-h-screen p-5 font-sans">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-2xl p-8 md:p-10">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 bg-ads-accent/10 text-ads-accent-light px-4 py-1.5 rounded-full text-sm font-medium mb-4">
                <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                図解ツール
            </div>
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight mb-3">記事図解ジェネレーター</h1>
            <p class="text-ads-muted">長文記事を直感的でわかりやすいHTML図解に変換</p>
        </div>

        <!-- Usage Note -->
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-5 mb-8">
            <div class="flex items-start gap-3">
                <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-amber-100 flex-shrink-0 mt-0.5">
                    <i data-lucide="lightbulb" class="w-4 h-4 text-amber-600"></i>
                </div>
                <div>
                    <p class="font-bold text-amber-800 mb-1">使い方</p>
                    <ol class="text-sm text-amber-700 space-y-1 list-decimal list-inside">
                        <li>記事URLを入力するか、直接テキストを貼り付ける</li>
                        <li>「図解を生成」ボタンをクリック</li>
                        <li>生成後に表示される「図解を開く」ボタンをクリックして確認</li>
                    </ol>
                </div>
            </div>
        </div>

        <!-- URL Input -->
        <div class="mb-6">
            <label for="articleUrl" class="flex items-center gap-2 font-bold text-slate-900 mb-2">
                <i data-lucide="link" class="w-4 h-4 text-ads-accent"></i>
                記事URL (オプション)
            </label>
            <input type="text" id="articleUrl"
                placeholder="https://newspicks.com/news/... など"
                class="w-full px-4 py-3 border-2 border-ads-border rounded-xl text-base transition-colors focus:outline-none focus:border-ads-accent">
        </div>

        <!-- Text Input -->
        <div class="mb-8">
            <label for="articleText" class="flex items-center gap-2 font-bold text-slate-900 mb-2">
                <i data-lucide="file-text" class="w-4 h-4 text-ads-accent"></i>
                記事テキスト
            </label>
            <textarea id="articleText"
                placeholder="ここに記事の内容を貼り付けてください..."
                class="w-full px-4 py-3 border-2 border-ads-border rounded-xl text-base min-h-[300px] resize-y transition-colors focus:outline-none focus:border-ads-accent font-sans"></textarea>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mb-3">
            <button id="generateBtn"
                class="flex-1 py-4 px-6 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold rounded-xl text-base tracking-wide transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-blue-500/30 disabled:opacity-60 disabled:cursor-not-allowed disabled:translate-y-0 disabled:shadow-none cursor-pointer">
                <span class="flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    図解を生成
                </span>
            </button>
            <button id="clearBtn"
                class="px-6 py-4 bg-ads-surface text-ads-muted font-bold rounded-xl text-base transition-colors hover:bg-ads-hover cursor-pointer">
                <span class="flex items-center justify-center gap-2">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                    クリア
                </span>
            </button>
        </div>

        <div class="mb-6">
            <button id="stopBtn"
                class="w-full py-3 px-6 bg-red-50 text-red-600 border border-red-200 font-bold rounded-xl text-sm transition-all hover:bg-red-100 cursor-pointer">
                <span class="flex items-center justify-center gap-2">
                    <i data-lucide="square" class="w-4 h-4"></i>
                    サーバーを停止
                </span>
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden text-center py-8">
            <div class="w-12 h-12 border-4 border-ads-border border-t-ads-accent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-ads-muted font-medium">図解を生成中です... しばらくお待ちください</p>
        </div>

        <!-- Status -->
        <div id="status" class="hidden"></div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const stopBtn = document.getElementById('stopBtn');
        const articleUrl = document.getElementById('articleUrl');
        const articleText = document.getElementById('articleText');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');

        generateBtn.addEventListener('click', async () => {
            const url = articleUrl.value.trim();
            const text = articleText.value.trim();

            if (!url && !text) {
                showStatus('URLまたはテキストを入力してください', 'error');
                return;
            }

            try {
                generateBtn.disabled = true;
                loading.classList.remove('hidden');
                status.classList.add('hidden');
                status.innerHTML = '';

                const response = await fetch('http://localhost:8000/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, text: text })
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus('図解の生成に成功しました!', 'success');

                    const outputDiv = document.createElement('div');
                    outputDiv.className = 'mt-4 bg-blue-50 border border-blue-200 rounded-xl p-5';
                    outputDiv.innerHTML = `
                        <div class="flex items-center gap-2 mb-3">
                            <i data-lucide="check-circle" class="w-5 h-5 text-ads-positive"></i>
                            <strong class="text-slate-900">${result.file_name}</strong>
                        </div>
                        <button onclick="openFile('${result.file_name.replace(/'/g, "\\'")}')"
                            class="w-full py-3 px-4 bg-ads-accent text-white font-bold rounded-lg text-sm transition-all hover:bg-ads-accent-light hover:-translate-y-0.5 hover:shadow-lg cursor-pointer mb-3">
                            <span class="flex items-center justify-center gap-2">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                                図解を開く
                            </span>
                        </button>
                        <div class="text-xs text-ads-dim font-mono break-all">${result.file_path}</div>
                    `;
                    status.appendChild(outputDiv);
                    lucide.createIcons();
                } else {
                    showStatus('エラー: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('エラーが発生しました: ' + error.message, 'error');
            } finally {
                generateBtn.disabled = false;
                loading.classList.add('hidden');
            }
        });

        clearBtn.addEventListener('click', () => {
            articleUrl.value = '';
            articleText.value = '';
            status.classList.add('hidden');
            status.innerHTML = '';
        });

        stopBtn.addEventListener('click', async () => {
            if (confirm('サーバーを停止しますか？\n停止後は python app.py を再度実行して起動してください。')) {
                try {
                    const response = await fetch('/shutdown', { method: 'POST' });
                    if (response.ok) {
                        alert('サーバーを停止しました。\nこのウィンドウを閉じてください。');
                        window.close();
                    } else {
                        alert('サーバーの停止に失敗しました。\nコマンドプロンプトで Ctrl+C を押してください。');
                    }
                } catch (error) {
                    alert('サーバーが停止しました。\nこのウィンドウを閉じてください。');
                    setTimeout(() => window.close(), 1000);
                }
            }
        });

        function showStatus(message, type) {
            status.innerHTML = '';
            const msgDiv = document.createElement('div');
            if (type === 'success') {
                msgDiv.className = 'bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl p-4 flex items-center gap-2';
                msgDiv.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i><span class="font-medium">${message}</span>`;
            } else {
                msgDiv.className = 'bg-red-50 border border-red-200 text-red-800 rounded-xl p-4 flex items-center gap-2';
                msgDiv.innerHTML = `<i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i><span class="font-medium">${message}</span>`;
            }
            status.appendChild(msgDiv);
            status.classList.remove('hidden');
            lucide.createIcons();
        }

        async function openFile(fileName) {
            try {
                const encodedFileName = encodeURIComponent(fileName);
                const url = `/open_file/${encodedFileName}`;
                const response = await fetch(url);
                const contentType = response.headers.get('content-type');

                let result;
                if (contentType && contentType.includes('application/json')) {
                    result = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error(`サーバーから予期しないレスポンスが返されました`);
                }

                if (response.ok) {
                    const successMsg = document.createElement('div');
                    successMsg.className = 'mt-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg p-3 text-sm flex items-center gap-2';
                    successMsg.innerHTML = '<i data-lucide="check" class="w-4 h-4 flex-shrink-0"></i><span>図解をブラウザで開きました</span>';
                    status.appendChild(successMsg);
                    lucide.createIcons();
                } else {
                    alert('ファイルが見つかりませんでした: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('ファイルを開く際にエラーが発生しました: ' + error.message);
            }
        }

        articleUrl.addEventListener('input', () => {
            if (articleUrl.value.trim()) {
                articleText.placeholder = 'URLが指定されている場合、テキストは無視されます';
            } else {
                articleText.placeholder = 'ここに記事の内容を貼り付けてください...';
            }
        });
    </script>
</body>
</html>
